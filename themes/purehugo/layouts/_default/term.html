{{ partial "header.html" . }}

{{ partial "topbar.html" . }}

<div id="layout">
  <div class="content">
    <div>
      <h1 class="category-index-title">{{ .Title }}</h1>

      <!-- A wrapper for all the blog posts -->
      <div class="posts">
        {{ range .Paginator.Pages }}
          {{ partial "post-list-item.html" . }}
        {{ end }}
      </div>
      {{ partial "pagination.html" . }}
      {{ partial "footer.html" . }}
    </div>
  </div>
</div>
</body>
</html>
